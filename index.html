<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insta Quote AI — Sales Training Quizzes</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Insta Quote AI</h1>
      <p class="tagline">Sales Training Quizzes</p>
    </header>

    <main id="main">
      <!-- Quiz selection screen -->
      <section id="select-screen" class="screen">
        <h2>Choose a quiz</h2>
        <p class="select-intro">Pick which area you'd like to test yourself on. You can take both as many times as you like.</p>

        <div class="quiz-cards">
          <button class="quiz-card" data-quiz="sales">
            <div class="quiz-card-tag">Quiz 1</div>
            <div class="quiz-card-title">Sales Knowledge</div>
            <div class="quiz-card-desc">What Insta Quote AI does, how it's set up, pricing, integrations, and handling common objections.</div>
            <div class="quiz-card-meta"><span id="sales-count">27</span> questions</div>
          </button>

          <button class="quiz-card" data-quiz="aiBasics">
            <div class="quiz-card-tag">Quiz 2</div>
            <div class="quiz-card-title">AI Basics</div>
            <div class="quiz-card-desc">What AI actually is, how it learns, why it's accurate, and how it fits into the trades.</div>
            <div class="quiz-card-meta"><span id="ai-count">11</span> questions</div>
          </button>
        </div>
      </section>

      <!-- Quiz screen -->
      <section id="quiz-screen" class="screen hidden">
        <button id="back-to-select" class="back-btn">← Back to quizzes</button>
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div class="quiz-meta">
          <span id="topic-label" class="topic-label"></span>
          <span id="question-counter" class="question-counter"></span>
        </div>
        <h2 id="question-text" class="question-text"></h2>
        <div id="options" class="options"></div>
        <div id="feedback" class="feedback hidden">
          <div id="feedback-status" class="feedback-status"></div>
          <p id="feedback-explanation" class="feedback-explanation"></p>
          <button id="next-btn" class="primary-btn">Next Question</button>
        </div>
      </section>

      <!-- Results screen -->
      <section id="results-screen" class="screen hidden">
        <h2 id="results-title">Quiz Complete</h2>
        <div class="score-card">
          <div class="score-number">
            <span id="score-correct">0</span><span class="score-divider">/</span><span id="score-total">0</span>
          </div>
          <div id="score-percent" class="score-percent">0%</div>
          <div id="score-message" class="score-message"></div>
        </div>

        <div class="topic-breakdown">
          <h3>Performance by Topic</h3>
          <div id="topic-results"></div>
        </div>

        <div class="review-section">
          <h3>Review Your Answers</h3>
          <div id="review-list"></div>
        </div>

        <button id="restart-btn" class="primary-btn">Take This Quiz Again</button>
        <button id="choose-another-btn" class="secondary-btn">Choose Another Quiz</button>
      </section>
    </main>

    <footer class="footer">
      <p>Insta Quote AI — Sales Training</p>
    </footer>
  </div>

  <script src="quiz.js"></script>
</body>
</html>
